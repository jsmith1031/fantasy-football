<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shane's FF Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1120;
    --bg-panel:#131B2E;
    --bg-panel-2:#0F1729;
    --border:#28324A;
    --border-bright:#3A4A6B;
    --gold:#FFB627;
    --cyan:#5EEAD4;
    --red:#FF6B6B;
    --green:#4ADE80;
    --text:#EEF1F8;
    --text-muted:#8993AC;
    --text-dim:#5B6480;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:
      radial-gradient(ellipse 900px 500px at 15% -10%, #1A2440 0%, transparent 60%),
      radial-gradient(ellipse 900px 500px at 100% 0%, #14203A 0%, transparent 55%),
      var(--bg);
    color:var(--text); font-family:'Inter',sans-serif; min-height:100vh;}
  h1,h2,h3{font-family:'Oswald',sans-serif; letter-spacing:0.02em; margin:0;}
  .mono{font-family:'JetBrains Mono',monospace;}

  /* ---- Ticker ---- */
  .ticker-wrap{background:#000; border-bottom:1px solid var(--border-bright); overflow:hidden; position:relative; height:34px;}
  .ticker-wrap::before, .ticker-wrap::after{content:"";position:absolute;top:0;bottom:0;width:40px;z-index:2;}
  .ticker-wrap::before{left:0;background:linear-gradient(90deg,#000,transparent);}
  .ticker-wrap::after{right:0;background:linear-gradient(270deg,#000,transparent);}
  .ticker{display:flex; white-space:nowrap; position:absolute; animation:scroll 32s linear infinite; height:34px; align-items:center;}
  .ticker span{padding:0 28px; font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--gold); letter-spacing:0.04em; display:inline-flex; align-items:center; gap:8px;}
  .ticker span b{color:var(--cyan); font-weight:700;}
  .ticker span::after{content:"◆"; color:var(--border-bright); margin-left:28px; font-size:9px;}
  @keyframes scroll{ from{transform:translateX(0);} to{transform:translateX(-50%);} }

  /* ---- Header ---- */
  .header{max-width:1180px; margin:0 auto; padding:28px 24px 18px; display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;}
  .header-left{display:flex; align-items:center; gap:16px;}
  .avatar{width:56px; height:56px; border-radius:10px; background:var(--bg-panel); border:1px solid var(--border-bright); object-fit:cover;}
  .league-name{font-size:28px; font-weight:700; color:var(--text); text-transform:uppercase;}
  .league-sub{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-muted); margin-top:4px; letter-spacing:0.03em;}
  .status-pill{display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; letter-spacing:0.08em; background:rgba(74,222,128,0.12); color:var(--green); border:1px solid rgba(74,222,128,0.35); margin-left:8px; vertical-align:middle;}

  .controls{display:flex; gap:8px; align-items:center;}
  .controls input{background:var(--bg-panel); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:12.5px; width:230px;}
  .controls input:focus{outline:none; border-color:var(--gold);}
  .controls button{background:var(--gold); color:#171208; border:none; padding:10px 16px; border-radius:8px; font-weight:700; font-size:12.5px; letter-spacing:0.03em; cursor:pointer; font-family:'Inter',sans-serif; text-transform:uppercase;}
  .controls button:hover{background:#ffc451;}
  .controls button:disabled{background:var(--border); color:var(--text-dim); cursor:default;}

  .wrap{max-width:1180px; margin:0 auto; padding:8px 24px 80px;}

  .msg{padding:40px 20px; text-align:center; color:var(--text-muted); font-family:'JetBrains Mono',monospace; font-size:13px;}
  .msg.error{color:var(--red);}

  /* ---- KPI cards ---- */
  .kpi-grid{display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin:18px 0 28px;}
  @media(max-width:980px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
  .kpi{background:var(--bg-panel); border:1px solid var(--border); border-radius:10px; padding:14px 14px 12px; position:relative; overflow:hidden;}
  .kpi::before{content:"";position:absolute; top:0; left:0; width:100%; height:2px; background:linear-gradient(90deg,var(--gold),transparent);}
  .kpi-label{font-size:9.5px; text-transform:uppercase; letter-spacing:0.09em; color:var(--text-dim); font-weight:600;}
  .kpi-value{font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--text); margin-top:6px; line-height:1.1;}
  .kpi-sub{font-size:11px; color:var(--text-muted); margin-top:4px;}

  /* ---- Section ---- */
  .section{margin-bottom:32px;}
  .section-head{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .section-head h2{font-size:15px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text);}
  .section-head .rule{flex:1; height:1px; background:linear-gradient(90deg,var(--border-bright),transparent);}
  .section-head .tag{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--gold); border:1px solid rgba(255,182,39,0.35); padding:2px 6px; border-radius:4px;}

  .panel{background:var(--bg-panel); border:1px solid var(--border); border-radius:12px; overflow:hidden;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-dim); font-weight:600; padding:10px 14px; border-bottom:1px solid var(--border);}
  td{padding:10px 14px; border-bottom:1px solid var(--border); color:var(--text);}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:rgba(255,255,255,0.02);}
  .rank{font-family:'JetBrains Mono',monospace; color:var(--text-dim); width:28px;}
  .rank.gold{color:var(--gold); font-weight:700;}
  .team-cell{display:flex; align-items:center; gap:10px;}
  .team-avatar{width:28px; height:28px; border-radius:6px; background:var(--bg-panel-2); border:1px solid var(--border); object-fit:cover; flex-shrink:0;}
  .team-name{font-weight:600;}
  .owner-name{font-size:11px; color:var(--text-muted);}
  .num{font-family:'JetBrains Mono',monospace; text-align:right;}
  .streak-w{color:var(--green); font-weight:700;}
  .streak-l{color:var(--red); font-weight:700;}

  .taxi-chip{display:inline-block; background:var(--bg-panel-2); border:1px solid var(--border); border-radius:6px; padding:3px 9px; margin:2px 4px 2px 0; font-size:12px; font-weight:600; color:var(--text);}
  .taxi-chip em{font-style:normal; color:var(--cyan); font-weight:500; margin-left:4px;}

  /* ---- Bar chart ---- */
  .bar-row{display:grid; grid-template-columns:170px 1fr 70px; align-items:center; gap:10px; padding:9px 14px;}
  .bar-row:not(:last-child){border-bottom:1px solid var(--border);}
  .bar-track{background:var(--bg-panel-2); border-radius:5px; height:16px; overflow:hidden; border:1px solid var(--border);}
  .bar-fill{height:100%; border-radius:5px; background:linear-gradient(90deg,var(--gold),#ff9d27);}
  .bar-val{font-family:'JetBrains Mono',monospace; font-size:12px; text-align:right; color:var(--text-muted);}
  .bar-label{font-size:12.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  .two-col{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
  @media(max-width:840px){.two-col{grid-template-columns:1fr;}}

  .footer-note{text-align:center; color:var(--text-dim); font-size:11px; font-family:'JetBrains Mono',monospace; margin-top:40px; letter-spacing:0.03em;}
  .footer-note a{color:var(--cyan); text-decoration:none;}

  .spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;display:inline-block;animation:spin 0.8s linear infinite; vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="ticker-wrap" id="tickerWrap" style="display:none;">
  <div class="ticker" id="ticker"></div>
</div>

<div class="header">
  <div class="header-left" id="headerLeft" style="display:none;">
    <img class="avatar" id="leagueAvatar" src="" alt="">
    <div>
      <div class="league-name" id="leagueName">—</div>
      <div class="league-sub" id="leagueSub">—</div>
    </div>
  </div>
  <div class="header-left" id="headerPlaceholder">
    <div>
      <div class="league-name">SLEEPER KPI DASHBOARD</div>
      <div class="league-sub">Enter a league ID to load 2025 season stats</div>
    </div>
  </div>
  <div class="controls">
    <input id="leagueIdInput" class="mono" placeholder="League ID" value="1317218659407495168">
    <input id="seasonInput" class="mono" placeholder="Season" value="2025" style="width:80px;">
    <button id="loadBtn" onclick="loadLeague()">Load League</button>
  </div>
</div>

<div class="wrap">
  <div id="content"></div>
</div>

<div class="footer-note">DATA: SLEEPER PUBLIC API · api.sleeper.app · REFRESH ANYTIME — NOTHING IS CACHED</div>

<script>
const API = "https://api.sleeper.app/v1";
// Optional: override the displayed league name (leave as "" to always show the live Sleeper league name)
const DISPLAY_NAME_OVERRIDE = "Shane's FF Tracker";
const contentEl = document.getElementById('content');

async function getJSON(url){
  const res = await fetch(url);
  if(!res.ok) throw new Error(`Request failed (${res.status}) for ${url}`);
  return res.json();
}

function avatarUrl(avatarId, fallback){
  if(!avatarId) return fallback || 'https://sleepercdn.com/images/v2/icons/player_default.webp';
  return `https://sleepercdn.com/avatars/thumbs/${avatarId}`;
}

function fmtPts(n){ return (Math.round(n*100)/100).toFixed(2); }

async function getPlayersMap(){
  const cacheKey = 'sleeper_players_cache_v1';
  try{
    const cachedRaw = localStorage.getItem(cacheKey);
    if(cachedRaw){
      const cached = JSON.parse(cachedRaw);
      if(Date.now() - cached.ts < 24*60*60*1000){
        return cached.data;
      }
    }
  }catch(e){ /* storage unavailable or corrupt — fall through to a fresh fetch */ }
  const data = await getJSON(`${API}/players/nfl`);
  try{ localStorage.setItem(cacheKey, JSON.stringify({ts:Date.now(), data})); }
  catch(e){ /* likely over quota (~5MB payload) — fine, we just won't cache it */ }
  return data;
}

// Sleeper rolls a league to a new league_id each season, linked backward via
// previous_league_id. Given any league_id in the chain, walk backward until we
// find the season the user actually wants.
async function resolveLeagueForSeason(startLeagueId, targetSeason){
  let currentId = startLeagueId;
  for(let hop=0; hop<25; hop++){
    const lg = await getJSON(`${API}/league/${currentId}`);
    if(!targetSeason || lg.season === String(targetSeason)) return lg;
    if(!lg.previous_league_id) return lg; // no older season available, return what we have
    currentId = lg.previous_league_id;
  }
  return getJSON(`${API}/league/${currentId}`);
}

async function loadLeague(){
  const leagueIdRaw = document.getElementById('leagueIdInput').value.trim();
  const targetSeason = document.getElementById('seasonInput').value.trim();
  const btn = document.getElementById('loadBtn');
  if(!leagueIdRaw){ return; }
  btn.disabled = true;
  document.getElementById('tickerWrap').style.display = 'none';
  contentEl.innerHTML = `<div class="msg"><span class="spinner"></span>&nbsp;&nbsp;Pulling league data from Sleeper…</div>`;

  try{
    const league = await resolveLeagueForSeason(leagueIdRaw, targetSeason);
    const leagueId = league.league_id;
    if(targetSeason && league.season !== String(targetSeason)){
      contentEl.innerHTML = `<div class="msg error">Couldn't find a ${targetSeason} season for that league — the earliest linked season found was ${league.season}.</div>`;
      btn.disabled = false;
      return;
    }
    const [users, rosters, nflState] = await Promise.all([
      getJSON(`${API}/league/${leagueId}/users`),
      getJSON(`${API}/league/${leagueId}/rosters`),
      getJSON(`${API}/state/nfl`)
    ]);

    // map roster_id -> user info
    const userMap = {};
    users.forEach(u => userMap[u.user_id] = u);

    const teams = rosters.map(r => {
      const u = userMap[r.owner_id] || {};
      const s = r.settings || {};
      return {
        roster_id: r.roster_id,
        owner_id: r.owner_id,
        team_name: (u.metadata && u.metadata.team_name) || u.display_name || `Team ${r.roster_id}`,
        owner_name: u.display_name || 'Unknown',
        avatar: (u.metadata && u.metadata.avatar) || avatarUrl(u.avatar),
        wins: s.wins||0, losses: s.losses||0, ties: s.ties||0,
        fpts: (s.fpts||0) + (s.fpts_decimal||0)/100,
        fpts_against: (s.fpts_against||0) + (s.fpts_against_decimal||0)/100,
        ppts: (s.ppts||0) + (s.ppts_decimal||0)/100,
        moves: s.total_moves||0,
        waiver_budget_used: s.waiver_budget_used||0,
        streak_arr: [],
        taxi: r.taxi || [],
        reserve: r.reserve || [],
        players: r.players || []
      };
    });
    const teamByRoster = {}; teams.forEach(t=>teamByRoster[t.roster_id]=t);

    // Resolve taxi squad player names — Sleeper only exposes this via the full
    // player database (~5MB), so fetch it once and cache in the browser for a day.
    const anyTaxi = teams.some(t=>t.taxi.length>0);
    if(anyTaxi){
      let playersMap = {};
      try{ playersMap = await getPlayersMap(); }catch(e){ console.error('Could not load player database:', e); }
      teams.forEach(t=>{
        t.taxiPlayers = t.taxi.map(pid=>{
          const p = playersMap[pid];
          if(!p) return {id:pid, name:`Player ${pid}`, pos:'', nfl_team:''};
          return {
            id:pid,
            name: p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim() || pid,
            pos: p.position || '',
            nfl_team: p.team || 'FA'
          };
        });
        t.activeCount = Math.max(0, (t.players.length||0) - t.taxi.length - t.reserve.length);
      });
    } else {
      teams.forEach(t=>{ t.taxiPlayers = []; t.activeCount = Math.max(0, (t.players.length||0) - t.reserve.length); });
    }

    // Determine regular season weeks to scan.
    // Prefer counting actual completed games from each roster's record — this works
    // correctly for past seasons regardless of what the *live* NFL week currently is.
    const playoffStart = (league.settings && league.settings.playoff_week_start) || 15;
    const season = league.season;
    const gamesPlayed = Math.max(0, ...rosters.map(r=>{
      const s = r.settings || {};
      return (s.wins||0) + (s.losses||0) + (s.ties||0);
    }));
    const isCurrentSeason = nflState.season === season;
    const liveWeekEstimate = isCurrentSeason ? Math.max(1, (nflState.week||1) - 1) : (playoffStart-1);
    const bestGuess = gamesPlayed > 0 ? gamesPlayed : liveWeekEstimate;
    const weeksToScan = Math.max(1, Math.min(bestGuess, playoffStart-1, 18));

    // Pull matchups + transactions in parallel per week
    const weekPromises = [];
    for(let w=1; w<=weeksToScan; w++){
      weekPromises.push(getJSON(`${API}/league/${leagueId}/matchups/${w}`).then(d=>({week:w, data:d})).catch(()=>({week:w,data:[]})));
    }
    const txPromises = [];
    for(let w=1; w<=weeksToScan; w++){
      txPromises.push(getJSON(`${API}/league/${leagueId}/transactions/${w}`).then(d=>({week:w,data:d})).catch(()=>({week:w,data:[]})));
    }
    const [weekResults, txResults] = await Promise.all([Promise.all(weekPromises), Promise.all(txPromises)]);

    // Aggregate weekly stats
    let highScore = null, lowScore = null;
    let closest = null, blowout = null;
    const weeklyRows = [];

    weekResults.sort((a,b)=>a.week-b.week).forEach(({week,data})=>{
      if(!data || data.length===0) return;
      const byMatchup = {};
      data.forEach(entry=>{
        if(entry.points == null) return;
        const team = teamByRoster[entry.roster_id];
        if(!team) return;
        if(!highScore || entry.points > highScore.pts) highScore = {pts:entry.points, team, week};
        if(!lowScore || entry.points < lowScore.pts) lowScore = {pts:entry.points, team, week};
        (byMatchup[entry.matchup_id] = byMatchup[entry.matchup_id]||[]).push({roster_id:entry.roster_id, points:entry.points});
      });
      Object.values(byMatchup).forEach(pair=>{
        if(pair.length!==2) return;
        const [a,b] = pair;
        const margin = Math.abs(a.points - b.points);
        const winnerRoster = a.points >= b.points ? a.roster_id : b.roster_id;
        const loserRoster = a.points >= b.points ? b.roster_id : a.roster_id;
        if(!closest || margin < closest.margin) closest = {margin, a, b, week};
        if(!blowout || margin > blowout.margin) blowout = {margin, a, b, week};
        if(teamByRoster[winnerRoster]) teamByRoster[winnerRoster].streak_arr.push({week, result:'W'});
        if(teamByRoster[loserRoster]) teamByRoster[loserRoster].streak_arr.push({week, result:'L'});
        weeklyRows.push({week, a, b});
      });
    });

    // Current streak per team
    teams.forEach(t=>{
      t.streak_arr.sort((x,y)=>x.week-y.week);
      let streak=0, type=null;
      for(let i=t.streak_arr.length-1;i>=0;i--){
        const r = t.streak_arr[i].result;
        if(type===null){ type=r; streak=1; }
        else if(r===type){ streak++; }
        else break;
      }
      t.streak = streak? `${type}${streak}` : '—';
      t.streakType = type;
    });

    // Transactions per roster
    const txCount = {}; const tradeCount = {};
    txResults.forEach(({data})=>{
      (data||[]).forEach(tx=>{
        if(tx.status !== 'complete') return;
        const rosters_ = tx.roster_ids || [];
        rosters_.forEach(rid=>{
          txCount[rid] = (txCount[rid]||0)+1;
          if(tx.type==='trade') tradeCount[rid]=(tradeCount[rid]||0)+1;
        });
      });
    });
    teams.forEach(t=>{ t.tx = txCount[t.roster_id]||0; t.trades = tradeCount[t.roster_id]||0; });

    // Sort standings: wins desc, then fpts desc
    const standings = [...teams].sort((x,y)=> (y.wins-y.ties*0 - (x.wins)) || (y.wins-x.wins) || (y.fpts-x.fpts));
    standings.sort((x,y)=> y.wins - x.wins || y.fpts - x.fpts);

    const leagueAvgPPG = teams.reduce((s,t)=>s+t.fpts,0) / (teams.length * Math.max(weeksToScan,1)) || 0;

    render({league, teams, standings, highScore, lowScore, closest, blowout, weeksToScan, weeklyRows, leagueAvgPPG});

  }catch(err){
    console.error('Sleeper dashboard error:', err);
    contentEl.innerHTML = `<div class="msg error">Couldn't load that league — ${err.message}. Double-check the League ID and try again.</div>`;
  }finally{
    btn.disabled = false;
  }
}

function render({league, teams, standings, highScore, lowScore, closest, blowout, weeksToScan, weeklyRows, leagueAvgPPG}){
  document.getElementById('headerPlaceholder').style.display='none';
  document.getElementById('headerLeft').style.display='flex';
  document.getElementById('leagueAvatar').src = league.avatar ? `https://sleepercdn.com/avatars/${league.avatar}` : 'https://sleepercdn.com/images/v2/icons/player_default.webp';
  document.getElementById('leagueName').textContent = DISPLAY_NAME_OVERRIDE || league.name;
  document.getElementById('leagueSub').textContent = `${league.season} SEASON · ${league.total_rosters} TEAMS · ${(league.status||'').toUpperCase()}`;

  const leader = standings[0];
  const hasScoreData = !!(highScore && lowScore && closest && blowout);

  // Ticker
  const tickerBits = [
    `LEAGUE: ${DISPLAY_NAME_OVERRIDE || league.name}`,
    `LEADER: <b>${leader.team_name}</b> (${leader.wins}-${leader.losses}${leader.ties?'-'+leader.ties:''})`,
  ];
  if(hasScoreData){
    tickerBits.push(
      `HIGH SCORE: <b>${highScore.team.team_name} — ${fmtPts(highScore.pts)}</b> (WK ${highScore.week})`,
      `BIGGEST BLOWOUT: WK ${blowout.week} — margin ${fmtPts(blowout.margin)}`,
      `CLOSEST GAME: WK ${closest.week} — margin ${fmtPts(closest.margin)}`,
    );
  }
  tickerBits.push(`WEEKS TRACKED: ${weeksToScan}`);
  const tickerHtml = tickerBits.map(b=>`<span>${b}</span>`).join('');
  document.getElementById('ticker').innerHTML = tickerHtml + tickerHtml;
  document.getElementById('tickerWrap').style.display = 'block';

  const totalTaxi = teams.reduce((s,t)=>s + (t.taxi?t.taxi.length:0), 0);
  const kpis = [
    {label:'League Leader', value: leader.team_name, sub:`${leader.wins}-${leader.losses}${leader.ties?'-'+leader.ties:''} · ${fmtPts(leader.fpts)} PF`},
    {label:'Taxi Squad Players', value: totalTaxi, sub:`across ${teams.filter(t=>t.taxi&&t.taxi.length>0).length} of ${teams.length} teams`},
  ];

  if(hasScoreData){
    const closestTeamA = teams.find(t=>t.roster_id===closest.a.roster_id);
    const closestTeamB = teams.find(t=>t.roster_id===closest.b.roster_id);
    const blowoutWinner = blowout.a.points>=blowout.b.points ? blowout.a : blowout.b;
    const blowoutLoser  = blowout.a.points>=blowout.b.points ? blowout.b : blowout.a;
    const blowoutWinnerTeam = teams.find(t=>t.roster_id===blowoutWinner.roster_id);
    const blowoutLoserTeam = teams.find(t=>t.roster_id===blowoutLoser.roster_id);

    kpis.push(
      {label:'Highest Single Week', value: fmtPts(highScore.pts), sub:`${highScore.team.team_name} · Wk ${highScore.week}`},
      {label:'Lowest Single Week', value: fmtPts(lowScore.pts), sub:`${lowScore.team.team_name} · Wk ${lowScore.week}`},
      {label:'Closest Matchup', value: fmtPts(closest.margin)+' pts', sub:`${closestTeamA?.team_name||'—'} vs ${closestTeamB?.team_name||'—'} · Wk ${closest.week}`},
      {label:'Biggest Blowout', value: fmtPts(blowout.margin)+' pts', sub:`${blowoutWinnerTeam?.team_name||'—'} over ${blowoutLoserTeam?.team_name||'—'} · Wk ${blowout.week}`},
      {label:'League Avg PPG', value: fmtPts(leagueAvgPPG), sub:`across ${weeksToScan} weeks tracked`},
    );
  } else {
    kpis.push({label:'Weekly Scoring', value:'No data yet', sub:'This league has no completed matchups to analyze'});
  }

  const kpiHtml = kpis.map(k=>`
    <div class="kpi">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');

  // Standings table
  const standingsRows = standings.map((t,i)=>`
    <tr>
      <td class="rank ${i===0?'gold':''}">${i+1}</td>
      <td><div class="team-cell"><img class="team-avatar" src="${t.avatar}" onerror="this.style.display='none'"><div><div class="team-name">${t.team_name}</div><div class="owner-name">${t.owner_name}</div></div></div></td>
      <td class="num mono">${t.wins}-${t.losses}${t.ties?('-'+t.ties):''}</td>
      <td class="num mono">${fmtPts(t.fpts)}</td>
      <td class="num mono">${fmtPts(t.fpts_against)}</td>
      <td class="num mono">${fmtPts(t.fpts - t.fpts_against)}</td>
      <td class="num ${t.streakType==='W'?'streak-w':t.streakType==='L'?'streak-l':''}">${t.streak}</td>
    </tr>`).join('');

  // Power ranking bars (by points for)
  const maxFpts = Math.max(...teams.map(t=>t.fpts), 1);
  const rankedByFpts = [...teams].sort((a,b)=>b.fpts-a.fpts);
  const barsHtml = rankedByFpts.map(t=>`
    <div class="bar-row">
      <div class="bar-label" title="${t.team_name}">${t.team_name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(t.fpts/maxFpts*100).toFixed(1)}%"></div></div>
      <div class="bar-val">${fmtPts(t.fpts)}</div>
    </div>`).join('');

  // Transactions leaderboard
  const rankedByTx = [...teams].sort((a,b)=>b.tx-a.tx);
  const maxTx = Math.max(...teams.map(t=>t.tx),1);
  const txHtml = rankedByTx.map(t=>`
    <div class="bar-row">
      <div class="bar-label" title="${t.team_name}">${t.team_name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(t.tx/maxTx*100).toFixed(1)}%; background:linear-gradient(90deg,var(--cyan),#2fb8a4);"></div></div>
      <div class="bar-val">${t.tx} (${t.trades} trades)</div>
    </div>`).join('');

  // Week-by-week matchups
  let matchupsHtml = '<div class="msg" style="padding:24px;">No matchup data available for this league yet.</div>';
  if(weeklyRows && weeklyRows.length){
    const byWeek = {};
    weeklyRows.forEach(row => (byWeek[row.week] = byWeek[row.week]||[]).push(row));
    const weeks = Object.keys(byWeek).map(Number).sort((a,b)=>a-b);
    matchupsHtml = weeks.map(wk => {
      const rows = byWeek[wk].map(({a,b})=>{
        const teamA = teams.find(t=>t.roster_id===a.roster_id);
        const teamB = teams.find(t=>t.roster_id===b.roster_id);
        const aWins = a.points > b.points, bWins = b.points > a.points;
        return `
        <tr>
          <td><div class="team-cell"><img class="team-avatar" src="${teamA?.avatar||''}" onerror="this.style.display='none'"><div class="team-name" style="${aWins?'color:var(--green);':''}">${teamA?.team_name||'—'}</div></div></td>
          <td class="num mono" style="${aWins?'color:var(--green);font-weight:700;':''}">${fmtPts(a.points)}</td>
          <td class="num mono" style="color:var(--text-dim); width:24px;">vs</td>
          <td class="num mono" style="${bWins?'color:var(--green);font-weight:700;':''}">${fmtPts(b.points)}</td>
          <td><div class="team-cell" style="justify-content:flex-end; text-align:right;"><div class="team-name" style="${bWins?'color:var(--green);':''}">${teamB?.team_name||'—'}</div><img class="team-avatar" src="${teamB?.avatar||''}" onerror="this.style.display='none'"></div></td>
        </tr>`;
      }).join('');
      return `
        <div class="panel" style="margin-bottom:12px;">
          <div style="padding:10px 14px; border-bottom:1px solid var(--border); font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.06em; color:var(--gold); text-transform:uppercase;">Week ${wk}</div>
          <table><tbody>${rows}</tbody></table>
        </div>`;
    }).join('');
  }

  // Taxi squad breakdown
  const taxiRows = [...teams].sort((a,b)=> (b.taxi?.length||0) - (a.taxi?.length||0)).map(t=>{
    const players = t.taxiPlayers && t.taxiPlayers.length
      ? t.taxiPlayers.map(p=>`<span class="taxi-chip">${p.name}${p.pos?` <em>${p.pos}${p.nfl_team?'/'+p.nfl_team:''}</em>`:''}</span>`).join('')
      : `<span class="owner-name">— none —</span>`;
    return `
    <tr>
      <td><div class="team-cell"><img class="team-avatar" src="${t.avatar}" onerror="this.style.display='none'"><div class="team-name">${t.team_name}</div></div></td>
      <td class="num mono">${t.taxi?t.taxi.length:0}</td>
      <td>${players}</td>
    </tr>`;
  }).join('');

  contentEl.innerHTML = `
    <div class="kpi-grid">${kpiHtml}</div>

    <div class="section">
      <div class="section-head"><h2>Standings</h2><div class="rule"></div><span class="tag">${league.season}</span></div>
      <div class="panel">
        <table>
          <thead><tr><th>#</th><th>Team</th><th class="num">Record</th><th class="num">PF</th><th class="num">PA</th><th class="num">Diff</th><th class="num">Streak</th></tr></thead>
          <tbody>${standingsRows}</tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <div class="section-head"><h2>Taxi Squad</h2><div class="rule"></div><span class="tag">${totalTaxi} TOTAL</span></div>
      <div class="panel">
        <table>
          <thead><tr><th>Team</th><th class="num">On Taxi</th><th>Players</th></tr></thead>
          <tbody>${taxiRows}</tbody>
        </table>
      </div>
    </div>

    <div class="two-col">
      <div class="section">
        <div class="section-head"><h2>Power Ranking — Points For</h2><div class="rule"></div></div>
        <div class="panel">${barsHtml}</div>
      </div>
      <div class="section">
        <div class="section-head"><h2>Roster Activity</h2><div class="rule"></div></div>
        <div class="panel">${txHtml}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-head"><h2>Week-by-Week Matchups</h2><div class="rule"></div><span class="tag">${weeksToScan} WEEKS</span></div>
      ${matchupsHtml}
    </div>
  `;
}

// Auto-load on first visit with the prefilled league id
loadLeague();
</script>
</body>
</html>
